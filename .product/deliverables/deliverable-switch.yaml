  runner: cargo-test
  runner_args: rethrowing_the_resident_mode_is_rejected
- id: sw-human-only
  statement: A residency flip occurs only on a developer-issued throw-switch; no machine-rate process triggers one.
  status: passing
  runner: cargo-test
  runner_args: the_switch_is_the_only_path_between_modes
