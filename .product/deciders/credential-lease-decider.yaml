id: credential-lease-decider
decides_for: credential-lease
handles:
- exchange-credential
- revoke-credential
emits:
- credential-leased
- credential-revoked
evolves_from:
- credential-leased
- credential-revoked
rejects:
- inv-lease-needs-sandbox
- inv-nothing-to-revoke
logic:
  initial:
    phase: "none"
  evolve:
  - on: credential-leased
    set: { phase: "leased" }
  - on: credential-revoked
    set: { phase: "revoked" }
  decide:
  - on: exchange-credential
    guards:
    - expr: "command.sandbox_active"
      else_reject: inv-lease-needs-sandbox
    emit: [credential-leased]
  - on: revoke-credential
    guards:
    - expr: "state.phase == 'leased'"
      else_reject: inv-nothing-to-revoke
    emit: [credential-revoked]
scenarios:
- name: credentials are leased for a live sandbox
  given: []
  when: { command: exchange-credential, with: { sandbox_active: true } }
  then: { emit: [credential-leased] }
- name: a lease without a live sandbox is refused
  given: []
  when: { command: exchange-credential, with: { sandbox_active: false } }
  then: { reject: inv-lease-needs-sandbox }
- name: an active lease is revoked at teardown
  given: [credential-leased]
  when: revoke-credential
  then: { emit: [credential-revoked] }
- name: revoking a non-existent lease is refused
  given: []
  when: revoke-credential
  then: { reject: inv-nothing-to-revoke }
